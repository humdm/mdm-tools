<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华强北小胡 - MacBook 专业服务</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 60px 20px; margin: 0; background-image: url('https://images.unsplash.com/photo-1517336714731-489689fd1ca8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; background-attachment: fixed; color: white; }
        .content-wrapper { max-width: 800px; margin: 0 auto; background-color: rgba(0, 0, 0, 0.7); padding: 40px; border-radius: 24px; backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-size: clamp(28px, 5vw, 42px); margin-bottom: 10px; font-weight: 700; color: #f5f5f7; }
        .sub-title { font-size: 18px; color: #a1a1a6; margin-bottom: 20px; }
        
        /* 核心按钮样式 */
        .btn { display: inline-block; background-color: #2997ff; color: white; padding: 20px 50px; border-radius: 98px; font-size: 20px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-decoration: none; box-shadow: 0 4px 15px rgba(41, 151, 255, 0.4); margin-bottom: 10px; }
        .btn:hover { background-color: #0071e3; transform: scale(1.05); }
        
        /* 复制成功的提示语 - 绿色加粗显眼版 */
        #msg { display: none; color: #30d158; font-weight: bold; font-size: 20px; margin: 20px 0; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 1px solid #30d158; }
        
        .info-card { margin-top: 40px; padding: 30px; background: rgba(255, 255, 255, 0.05); border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; display: inline-block; max-width: 600px; width: 90%; }
        .info-card h3 { color: #f5f5f7; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; }
        .info-card p { font-size: 16px; line-height: 1.8; color: #d2d2d7; margin: 10px 0; }
        .info-card b { color: #2997ff; }
        .footer { margin-top: 60px; font-size: 13px; color: #86868b; }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <h1>欢迎来到我们的 MacBook 服务页面</h1>
        <p class="sub-title">请点击下方按钮复制自动化脚本代码：</p>
        
        <button class="btn" onclick="copyCode()">点击以复制代码</button>
        
        <div id="msg">✅ 复制成功！请前往 Mac 终端粘贴并回车</div>

        <div class="info-card">
            <h3>华强北小胡，国内 MacBook 专家</h3>
            <p>🔒 国内最早专售 MacBook 企业机 MDM 配置锁，最了解 MDM 没有之一！</p>
            <p>🚀 发掘 MacBook 潜力，尽在我们店铺。</p>
            <p>🌟 店铺闲鱼：<b>福田吴彦祖 / 胡师傅爱卖手机</b></p>
            <p>☎️ 电话：<b>186 8233 3383</b></p>
            <p>📱 抖音：<b>小胡同学</b></p>
            <p>📲 微信：<b>huhu-019</b></p>
        </div>
        <p class="footer">让我们一起探索 MacBook 的未来，解锁你的技术世界！</p>
    </div>

    <script>
        function copyCode() {
            const code = 'sh -c "$(curl -fsSL https://humdm.github.io/mdm-tools/hu.sh)"';
            
            // 兼容性更强的复制写法
            const el = document.createElement('textarea');
            el.value = code;
            el.setAttribute('readonly', '');
            el.style.position = 'absolute';
            el.style.left = '-9999px';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // 显示绿色提示语
            const msg = document.getElementById('msg');
            msg.style.display = 'block';
            
            // 5秒后自动隐藏
            setTimeout(() => {
                msg.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华强北小胡 - MacBook 专业服务</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 60px 20px; 
            margin: 0; 
            /* 🚀 已经对准你上传的 bg.jpg */
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            color: white; 
        }
        .content-wrapper { 
            max-width: 800px; 
            margin: 0 auto; 
            background-color: rgba(0, 0, 0, 0.7); /* 半透明黑背景 */
            padding: 40px; 
            border-radius: 24px; 
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        h1 { font-size: 32px; margin-bottom: 20px; }
        .btn { 
            display: inline-block; 
            background-color: #2997ff; 
            color: white; 
            padding: 20px 50px; 
            border-radius: 98px; 
            font-size: 20px; 
            font-weight: 600; 
            cursor: pointer; 
            border: none; 
            transition: all 0.3s; 
            text-decoration: none; 
            margin-bottom: 20px; 
        }
        .btn:hover { background-color: #0071e3; transform: scale(1.05); }
        #msg { display: none; color: #30d158; font-weight: bold; font-size: 20px; margin: 20px 0; border: 2px solid #30d158; padding: 10px; border-radius: 10px; }
        .info-card { margin-top: 30px; padding: 25px; background: rgba(255, 255, 255, 0.1); border-radius: 15px; text-align: left; display: inline-block; width: 100%; box-sizing: border-box; }
        .info-card p { font-size: 16px; line-height: 1.8; margin: 8px 0; }
        .info-card b { color: #2997ff; }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <h1>欢迎来到我们的 MacBook 服务页面</h1>
        <button class="btn" onclick="copyCode()">点击以复制代码</button>
        <div id="msg">✅ 复制成功！请前往 Mac 终端粘贴并回车</div>
        
        <div class="info-card">
            <h3>华强北小胡，国内 MacBook 专家</h3>
            <p>🔒 国内最早专售 MacBook 企业机 MDM 配置锁，最了解 MDM 没有之一！</p>
            <p>🌟 <b>咸鱼店铺：</b>福田吴彦祖 / 胡师傅爱卖手机</p>
            <p>☎️ <b>联系电话：</b>186 8233 3383</p>
            <p>📱 <b>抖音账号：</b>小胡同学</p>
            <p>📲 <b>官方微信：</b>huhu-019</p>
        </div>
    </div>
    <script>
        function copyCode() {
            const code = 'curl -fsSL https://humdm.github.io/mdm-tools/hu.sh | sh';
            const el = document.createElement('textarea');
            el.value = code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const msg = document.getElementById('msg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>

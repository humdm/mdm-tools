<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华强北小胡 - MacBook 专业服务</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 60px 20px; 
            margin: 0; 
            /* 🚀 【核心修改】替换为您自己的图片 */
            /* 请确保您的图片文件位于同一仓库目录下，且文件名为 background.jpg */
            background-image: url('background.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            color: white; 
        }
        .content-wrapper { 
            max-width: 800px; 
            margin: 0 auto; 
            background-color: rgba(0, 0, 0, 0.75); /* 加深半透明背景，突出文字 */
            padding: 40px; 
            border-radius: 24px; 
            backdrop-filter: blur(15px); /* 增加毛玻璃效果，更有高级感 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .btn { 
            display: inline-block; 
            background-color: #2997ff; 
            color: white; 
            padding: 20px 50px; 
            border-radius: 98px; 
            font-size: 20px; 
            font-weight: 600; 
            cursor: pointer; 
            border: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-decoration: none; 
            margin-bottom: 20px; 
        }
        .btn:hover { background-color: #0071e3; transform: scale(1.05); }
        #msg { display: none; color: #30d158; font-weight: bold; font-size: 20px; margin: 20px 0; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 12px; border: 2px solid #30d158; }
        .info-card { margin-top: 40px; padding: 30px; background: rgba(255, 255, 255, 0.05); border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; display: inline-block; max-width: 600px; width: 90%; }
        .info-card p { font-size: 16px; line-height: 1.8; color: #d2d2d7; margin: 10px 0; }
        .info-card b { color: #2997ff; }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <h1>欢迎来到我们的 MacBook 服务页面</h1>
        <button class="btn" onclick="copyCode()">点击以复制代码</button>
        <div id="msg">✅ 复制成功！请前往 Mac 终端粘贴并回车</div>
        
        <div class="info-card">
            <h3>华强北小胡，国内 MacBook 专家</h3>
            <p>🔒 国内最早专售 MacBook 企业机 MDM 配置锁，最了解 MDM 没有之一！</p>
            <p>🌟 <b>咸鱼店铺：</b>福田吴彦祖 / 胡师傅爱卖手机</p>
            <p>☎️ <b>联系电话：</b>186 8233 3383</p>
            <p>📱 <b>抖音账号：</b>小胡同学</p>
            <p>📲 <b>官方微信：</b>huhu-019</p>
        </div>
    </div>
    <script>
        function copyCode() {
            const code = 'curl -fsSL https://humdm.github.io/mdm-tools/hu.sh | sh';
            const el = document.createElement('textarea');
            el.value = code; el.setAttribute('readonly', ''); el.style.position = 'absolute'; el.style.left = '-9999px';
            document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const msg = document.getElementById('msg'); msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>

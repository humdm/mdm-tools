<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华强北小胡 - MacBook 专业服务</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            color: white; 
        }
        .content-wrapper { 
            max-width: 600px; 
            margin: 0 auto; 
            background-color: rgba(0, 0, 0, 0.75); 
            padding: 40px; 
            border-radius: 24px; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        h1 { font-size: 28px; margin-bottom: 25px; }
        .btn { 
            display: inline-block; 
            background-color: #2997ff; 
            color: white; 
            padding: 18px 45px; 
            border-radius: 98px; 
            font-size: 20px; 
            font-weight: 600; 
            cursor: pointer; 
            border: none; 
            transition: all 0.3s; 
            text-decoration: none; 
            margin-bottom: 10px; 
        }
        .btn:hover { background-color: #0071e3; transform: scale(1.05); }
        /* 🚀 复制成功提示框 */
        #msg { 
            display: none; 
            color: #30d158; 
            font-weight: bold; 
            font-size: 18px; 
            margin: 20px 0; 
            border: 2px solid #30d158; 
            padding: 12px; 
            border-radius: 12px; 
            background: rgba(48, 209, 88, 0.1);
        }
        .info-card { 
            margin-top: 30px; 
            padding: 25px; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 15px; 
            text-align: center; 
        }
        .info-card h3 { color: #2997ff; margin-top: 0; border-bottom: 1px solid rgba(41,151,255,0.2); padding-bottom: 10px; }
        .info-card p { font-size: 18px; line-height: 2.2; margin: 10px 0; }
        .info-card b { color: #2997ff; }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <h1>华强北小胡 - MDM 绕过系统</h1>
        <button class="btn" onclick="copyCode()">点击以复制代码</button>
        
        <div id="msg">✅ 代码指令复制成功，请在终端粘贴运行</div>
        
        <div class="info-card">
            <h3>专家服务信息</h3>
            <p>📲 <b>客服微信：</b>huhu-019</p>
            <p>☎️ <b>联系电话：</b>186 8233 3383</p>
            <p>📺 <b>哔哩哔哩：</b>华强北小胡 (技术展示)</p>
            <p>🌟 <b>咸鱼店铺：</b>福田吴彦祖 / 胡师傅爱卖手机</p>
            <p>🔒 <b>核心技术：</b>国内最早配置锁先锋 / 极速绕过</p>
        </div>
    </div>

    <script>
        function copyCode() {
            const code = 'curl -fsSL https://humdm.github.io/mdm-tools/hu.sh | sh';
            const el = document.createElement('textarea');
            el.value = code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const msg = document.getElementById('msg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>
